services:
  proxy:
    build: .
    ports:
      - "8080:8080"
    environment:
      UPSTREAM: ${UPSTREAM:-https://api.deepseek.com}
      MAPPED_MODEL: ${MAPPED_MODEL:-}
      DS_V4_PRO_DEFAULTS: ${DS_V4_PRO_DEFAULTS:-}
      DS_THINKING: ${DS_THINKING:-}
      DS_REASONING_EFFORT: ${DS_REASONING_EFFORT:-}
      MODEL_MAP: ${MODEL_MAP:-}
    restart: unless-stopped
